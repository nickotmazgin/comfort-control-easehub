name: Release Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip libglib2.0-bin rsync

      - name: Build release zip
        run: |
          chmod +x ./create-release-zips.sh
          ./create-release-zips.sh

      - name: Resolve version and zip path
        id: meta
        run: |
          VERSION=$(python3 -c "import json; m=json.load(open('metadata.json')); print((m.get('version-name') or '').split()[0])")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip=dist/comfort-control@nickotmazgin-45-50.shell-extension.zip" >> "$GITHUB_OUTPUT"

      - name: Build release notes from CHANGELOG
        run: |
          python3 tools/release_notes_from_changelog.py "${{ steps.meta.outputs.version }}" > /tmp/release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP="${{ steps.meta.outputs.zip }}"
          VERSION="${{ steps.meta.outputs.version }}"
          TITLE="EaseHub ${VERSION} — GNOME 45–50"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" "$ZIP" --title "$TITLE" --notes-file /tmp/release-notes.md
          fi

      - name: Attest release zip (Sigstore)
        continue-on-error: true
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.meta.outputs.zip }}
          push-to-registry: false
